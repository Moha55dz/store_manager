{% extends 'base.html' %}

{% block content %}
<div dir="rtl" style="padding: 20px; max-width: 600px; margin: auto; background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
    <h2>✏️ تعديل بيانات الصيانة</h2>
    <form method="POST" action="">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;">اسم الزبون:</label>
            <input type="text" name="customer_name" value="{{ task.customer_name }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;">نوع الجهاز والمشكلة:</label>
            <input type="text" name="device_info" value="{{ task.device_info }}" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px;">التكلفة المتوقعة (DA):</label>
            <input type="number" name="cost" step="0.01" value="{{ task.cost }}" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
        </div>
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 5px;">حالة الصيانة:</label>
            <select name="status" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;">
                <option value="pending" {% if task.status == 'pending' %}selected{% endif %}>قيد الانتظار</option>
                <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>قيد الصيانة</option>
                <option value="completed" {% if task.status == 'completed' %}selected{% endif %}>مكتملة</option>
                <option value="external" {% if task.status == 'external' %}selected{% endif %}>صيانة خارجية</option>
            </select>
        </div>
        <button type="submit" style="background: #e67e22; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%;">
            تحديث البيانات
        </button>
        <div style="text-align: center; margin-top: 15px;">
            <a href="{% url 'maintenance_list' %}" style="color: #7f8c8d; text-decoration: none;">إلغاء والعودة للجدول</a>
        </div>
    </form>
</div>
{% endblock %}
