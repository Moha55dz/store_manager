{% extends 'base.html' %}

{% block content %}
<div dir="rtl" style="padding: 20px;">
    <h2>📋 الموردون</h2>
    <a href="{% url 'add_supplier' %}" style="background: #3a7bc8; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; display: inline-block; margin-bottom: 20px; font-weight: bold;">➕ إضافة عنصر جديد</a>
    
    <div style="overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; text-align: center; background: white; border: 1px solid #e0e0e0; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
            <tr style="background: #f7f9fc; color: #1e3a5f;">
            <th style='padding: 10px; border: 1px solid #e0e0e0;'>اسم المورد</th>
            <th style='padding: 10px; border: 1px solid #e0e0e0;'>رقم الهاتف</th>
            <th style='padding: 10px; border: 1px solid #e0e0e0;'>ديون المورد</th>
            <th style="padding: 10px; border: 1px solid #e0e0e0;">إجراءات</th>
            </tr>
            {% for item in items %}
            <tr style="transition: background 0.2s;" onmouseover="this.style.background='#f1f5f9';" onmouseout="this.style.background='white';">
            <td style='padding: 10px; border: 1px solid #e0e0e0;'>{{ item.name }}</td>
            <td style='padding: 10px; border: 1px solid #e0e0e0;'>{{ item.phone }}</td>
            <td style='padding: 10px; border: 1px solid #e0e0e0;'>{{ item.debt }}</td>
            <td style="padding: 10px; border: 1px solid #e0e0e0;">
                    <a href="{% url 'edit_supplier' item.id %}" style="color: #f39c12; text-decoration: none; font-weight: bold;">تعديل ✏️</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" style="padding: 20px; color: #7f8c8d;">لا توجد بيانات حالياً.</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</div>
{% endblock %}
